name: Build Kyoga TV EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-WebEngine pyinstaller

    - name: Build Executable
      run: |
        pyinstaller --noconsole --onefile --icon=logo.ico --add-data "logo.ico;." player.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kyoga-TV-Desktop
        path: dist/player.exe
