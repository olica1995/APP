name: Build Kyoga TV EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added 'pillow' here to fix the icon format error
          pip install PyQt6 PyQt6-WebEngine pyinstaller pillow

      - name: Build EXE
        shell: pwsh
        run: |
          # The 'pillow' library will now handle the conversion of logo.ico automatically
          if (Test-Path "logo.ico") {
            pyinstaller --noconsole --onefile --icon="logo.ico" --add-data "logo.ico;." player.py
          } else {
            pyinstaller --noconsole --onefile player.py
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kyoga-TV-App
          path: dist/player.exe
